services:
    app:
        build: .
        container_name: laravel_app
        volumes:
            - .:/var/www
        working_dir: /var/www
        depends_on:
            - mysql
            - redis
        environment:
            DB_HOST: mysql
            DB_DATABASE: laravel
            DB_USERNAME: laravel
            DB_PASSWORD: secret
            REDIS_HOST: redis
            REDIS_PORT: 6379

    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        ports:
            - "8000:80"
        volumes:
            - .:/var/www
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    mysql:
        image: mysql:8.0
        container_name: laravel_mysql
        environment:
            MYSQL_DATABASE: laravel
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: rootsecret
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - "3306:3306"

    redis:
        image: redis:alpine
        container_name: laravel_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

volumes:
    mysql_data:
    redis_data:
